                        <br> Take Care
                </h1>
                <h6> 21. 1. 2026 </h6>
        </header>
        <main>
                <p>
                Beneath six feet without a headstone, <br>
                with the weeping willows growing close, <br>
                lays a body of somebody that nobody really knows.
                </p>

                <p>
                People come and go to pass time, <br>
                pass by, leaving flowers on the ground, <br>
                for someone they never knew and never will know now.
                </p>
        </main>
